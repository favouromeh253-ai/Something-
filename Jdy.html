<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Her ❤️</title>
<link href="https://googleapis.com" rel="stylesheet">

<style>
    :root { --sakura: #ffb7c5; --accent: #ff8fa3; --glass: rgba(255, 255, 255, 0.08); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Poppins', sans-serif;
        background: radial-gradient(circle at center, #1b1b2f 0%, #050505 100%);
        color: white; overflow-x: hidden; scroll-behavior: smooth;
    }

    #star-container { position: fixed; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
    @keyframes twinkle { 50% { opacity: 1; transform: scale(1.2); } }

    .blossom { position: fixed; top: -50px; font-size: 24px; pointer-events: none; z-index: 5; animation: fall linear infinite; }
    @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

    .section { min-height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; position: relative; z-index: 10; }
    
    .content-card { 
        background: var(--glass); 
        backdrop-filter: blur(15px); 
        -webkit-backdrop-filter: blur(15px); 
        padding: 50px 30px; 
        border-radius: 35px; 
        border: 1px solid rgba(255, 255, 255, 0.1); 
        max-width: 650px; 
        width: 100%; 
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    h1 { font-family: 'Great Vibes', cursive; font-size: clamp(55px, 12vw, 85px); background: linear-gradient(to bottom, #fff, var(--sakura)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px var(--sakura)); margin-bottom: 20px; }
    
    p { line-height: 1.9; font-size: clamp(17px, 4.5vw, 20px); font-weight: 300; color: #fce4ec; }

    .hidden { opacity: 0; transform: translateY(40px); transition: 1.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .show { opacity: 1; transform: translateY(0); }

    button { 
        margin-top: 30px; padding: 16px 45px; border: none; border-radius: 50px; 
        background: linear-gradient(45deg, var(--accent), var(--sakura)); 
        color: #1a1a2e; font-weight: 600; font-size: 18px; cursor: pointer; 
        transition: 0.4s; box-shadow: 0 5px 20px rgba(255,143,163,0.4); 
    }
    button:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(255,143,163,0.6); }

    #videoSection { display: none; }
    .pulse-card { animation: heartbeat 2.5s infinite ease-in-out; }
    @keyframes heartbeat { 0%, 100% { box-shadow: 0 10px 40px rgba(0,0,0,0.5); } 50% { box-shadow: 0 0 50px rgba(255,143,163,0.4); } }
    
    video { width: 100%; max-width: 480px; border-radius: 25px; border: 1px solid var(--sakura); margin-bottom: 20px; }

    .signature { font-family: 'Great Vibes', cursive; font-size: 45px; opacity: 0; transition: 4s; color: var(--sakura); filter: drop-shadow(0 0 10px rgba(255,183,197,0.5)); }

    .trail { position: fixed; width: 6px; height: 6px; background: var(--sakura); border-radius: 50%; pointer-events: none; z-index: 100; animation: fadeOut 0.8s forwards; box-shadow: 0 0 8px var(--sakura); }
    @keyframes fadeOut { to { opacity: 0; transform: scale(3); } }
</style>
</head>
<body>

<div id="star-container"></div>
<audio id="bgMusic" loop><source src="https://bensound.com" type="audio/mpeg"></audio>

<section class="section">
    <h1>Juan ❤️</h1>
    <p>I’ve written this for you, from the deepest part of my heart...</p>
    <p style="font-size: 13px; margin-top: 50px; opacity: 0.4; letter-spacing: 3px;">SCROLL GENTLY ↓</p>
</section>

<!-- THE ROMANTIC LETTER FOR HER -->
<section class="section hidden"><div class="content-card"><p class="typing" data-text="Back in JSS1, I used to admire you from afar. You were this beautiful, quiet presence that I always found myself noticing, even when I didn't have the words to tell you how special you were."></p></div></section>

<section class="section hidden"><div class="content-card"><p class="typing" data-text="When you left, a little light went out of my world. I thought time would eventually fade the memory of your smile, but I've realized that some people are just etched into your soul forever."></p></div></section>

<section class="section hidden"><div class="content-card"><p class="typing" data-text="Seeing you again at church felt like a miracle I didn’t know I was allowed to ask for. It was God’s way of showing me that the most beautiful stories are the ones that find their way back home."></p></div></section>

<section class="section hidden"><div class="content-card"><p class="typing" data-text="I've realized that no matter how much time passes, my heart still knows exactly who you are. I don't want to be the one who stays silent anymore."></p></div></section>

<section class="section hidden">
    <div class="content-card">
        <p class="typing" data-text="Juan, you were my 'once upon a time,' and I truly hope you can be my 'happily ever after.' Please, look at this..."></p>
        <button onclick="showVideo()">Open My Heart ❤️</button>
    </div>
</section>

<!-- VIDEO SECTION -->
<section id="videoSection" class="section">
    <div class="content-card pulse-card">
        <video id="myVideo" controls><source src="your-video.mp4" type="video/mp4"></video>
        <div class="signature" id="sig">Juan... I love you ❤️</div>
    </div>
</section>

<script>
/* 🌌 STARS */
const container = document.getElementById('star-container');
for (let i = 0; i < 120; i++) {
    const s = document.createElement('div'); s.className = 'star';
    s.style.width = s.style.height = Math.random() * 3 + 'px';
    s.style.left = Math.random() * 100 + 'vw'; s.style.top = Math.random() * 100 + 'vh';
    s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
    container.appendChild(s);
}

/* 🌸 BLOSSOMS */
setInterval(() => {
    const b = document.createElement("div"); b.className = "blossom"; b.innerText = "🌸";
    b.style.left = Math.random() * 100 + "vw"; b.style.animationDuration = (Math.random() * 4 + 5) + "s";
    document.body.appendChild(b); setTimeout(() => b.remove(), 9000);
}, 500);

/* ✨ SPARKLE TRAIL */
document.addEventListener('mousemove', (e) => {
    const trail = document.createElement('div'); trail.className = 'trail';
    trail.style.left = e.clientX + 'px'; trail.style.top = e.clientY + 'px';
    document.body.appendChild(trail); setTimeout(() => trail.remove(), 800);
});

/* 🎬 SCROLL REVEAL */
const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add("show"); typeEffect(e.target); } });
}, { threshold: 0.6 });
document.querySelectorAll(".hidden").forEach(sec => obs.observe(sec));

function typeEffect(section){
    let el = section.querySelector(".typing"); if(!el || el.dataset.done) return;
    let text = el.dataset.text; el.innerHTML = ""; el.dataset.done = "true";
    let i = 0; function type(){ if(i < text.length){ el.innerHTML += text.charAt(i); i++; setTimeout(type, 50); } }
    setTimeout(type, 600);
}

function showVideo(){
    document.getElementById("bgMusic").play();
    const vSec = document.getElementById("videoSection");
    vSec.style.display = "flex";
    vSec.scrollIntoView({behavior: "smooth"});
    setTimeout(() => { document.getElementById("sig").style.opacity = 1; }, 2500);
}
</script>
</body>
</html>
